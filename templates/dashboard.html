{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <h1 class="text-center mb-4">Product Dashboard</h1>
    <div class="row">
        {% for p in products %}
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm">
                <img src="/static/uploads/{{ p.image }}" class="card-img-top" alt="{{ p.name }}" style="height: 200px; object-fit: cover;">
                <div class="card-body">
                    <h5 class="card-title">{{ p.name }}</h5>
                    <p class="card-text">Average Rating: <strong>{{ p.avg_rating }} ⭐</strong></p>
                    <a href="/product/{{ p.id }}" class="btn btn-primary btn-block">View Details</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
