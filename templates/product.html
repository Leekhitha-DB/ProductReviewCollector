{% extends "base.html" %}
{% block content %}

<h2>{{product.name}}</h2>

<div class="mb-2">
    ⭐ {{avg}} / 5 ({{count}} reviews)
</div>

{% for r in reviews %}
<div class="card p-2 mb-2">
    ⭐ {{r.rating}} - {{r.text}}
    <small class="text-muted">by {{r.user}}</small>
</div>
{% endfor %}

{% endblock %}
