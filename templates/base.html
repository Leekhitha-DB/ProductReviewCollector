<!DOCTYPE html>
<html>
<head>
<title>App</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
--bg:#eef2f6;
--surface:#ffffff;
--text:#1f2937;
--muted:#6b7280;
--brand:#0f766e;
--brand-soft:#dff6f3;
--line:#e5e7eb;
}
body{
background:radial-gradient(circle at top right,#d9f5ef 0%,#eef2f6 40%,#eef2f6 100%);
color:var(--text);
font-family:Segoe UI,system-ui,-apple-system,sans-serif;
}
.navbar{
background:linear-gradient(90deg,#0f172a,#1e293b)!important;
}
.app-shell{
max-width:1400px;
}
.card{
border:1px solid var(--line);
border-radius:14px;
box-shadow:0 10px 24px rgba(15,23,42,.06);
}
.card:hover{
transform:translateY(-2px);
transition:0.25s ease;
}
.star{cursor:pointer;color:gray;font-size:20px}
.star.selected{color:#f59e0b}
</style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
<a class="navbar-brand">Review System</a>
<a href="/logout" class="btn btn-danger">Logout</a>
</nav>
<div class="container app-shell mt-4">
{% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
