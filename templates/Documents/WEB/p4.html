<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>
<style>
/* Page background */
body {
background-color: #f2f2f2;
font-family: Arial, sans-serif;
}
/* Heading style */
h2 {
color: darkblue;
text-align: center;
font-size: 28px;
}
/* Table styling */
table {
background-color: white;
margin: auto;
border: 2px solid #333;
padding: 15px;
border-radius: 10px;
}
td {
padding: 8px;
font-size: 16px;
color: #333;
}
/* Input fields styling */
input, select, textarea {
padding: 5px;
font-size: 14px;
border: 1px solid #aaa;
border-radius: 4px;
}
/* Submit and Reset button style */
input[type="submit"], input[type="reset"] {
background-color: darkblue;
color: white;
font-size: 16px;
padding: 6px 12px;
border: none;
border-radius: 5px;
cursor: pointer;
}
input[type="submit"]:hover, input[type="reset"]:hover {
background-color: navy;
}
</style>
</head>
<body>
<h2>Registration Form</h2>
<form action="#" method="post">
<table>
<tr>
<td><label for="name">Full Name:</label></td>
<td><input type="text" id="name" name="fullname" placeholder="Enter your name"
required></td>
</tr>
<tr>
<td><label for="email">Email:</label></td>
<td><input type="email" id="email" name="email" placeholder="Enter your email"></td>
</tr>
<tr>
<td><label for="password">Password:</label></td>
<td><input type="password" id="password" name="password"></td>
</tr>
<tr>
<td>Gender:</td>
<td>
<input type="radio" name="gender" value="Male"> Male
<input type="radio" name="gender" value="Female"> Female
</td>
</tr>
<tr>
<td>Hobbies:</td>
<td>
<input type="checkbox" name="hobby" value="Reading"> Reading
<input type="checkbox" name="hobby" value="Music"> Music
<input type="checkbox" name="hobby" value="Sports"> Sports
</td>
</tr>
<tr>
<td><label for="dob">Date of Birth:</label></td>
<td><input type="date" id="dob" name="dob"></td>
</tr>
<tr>
<td><label for="country">Country:</label></td>
<td>
<select id="country" name="country">
<option value="">--Select--</option>
<option>India</option>
<option>USA</option>
<option>UK</option>
</select></td>
</tr>
<tr>
<td><label for="address">Address:</label></td>
<td><textarea id="address" name="address" rows="3" cols="25"></textarea></td>
</tr>
<tr>
<td colspan="2" style="text-align:center;">
<input type="submit" value="Register">
<input type="reset" value="Clear">
</td>
</tr>
</table>
</form>
</body>
</html>
