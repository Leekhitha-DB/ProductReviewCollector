<!DOCTYPE html>
<html>
<head>
<title>Simple Calculator</title>
<style>
body {
font-family: Arial, sans-serif;
background-color: #f2f2f2;
text-align: center;
}
.calculator {
background-color: white;
padding: 20px;
width: 300px;
margin: 50px auto;
border-radius: 10px;
box-shadow: 0px 0px 10px gray;
}
input {
width: 80%;
padding: 8px;
margin: 10px 0;
font-size: 16px;
}
button {
padding: 10px;
margin: 5px;
font-size: 14px;
background-color: #4CAF50;
color: white;
border: none;
cursor: pointer;
border-radius: 5px;
}
button:hover {
background-color: #45a049;
}
#result {
margin-top: 15px;
font-weight: bold;
color: blue;
}
</style>
</head>
<body>
<div class="calculator">
<h2>Simple Calculator</h2>
<input type="number" id="num1" placeholder="Enter first number"><br>
<input type="number" id="num2" placeholder="Enter second number"><br>
<button onclick="calculate('sum')">Sum</button>
<button onclick="calculate('difference')">Difference</button>
<button onclick="calculate('product')">Product</button>
<button onclick="calculate('quotient')">Quotient</button>
<button onclick="calculate('remainder')">Remainder</button>
<button onclick="calculate('power')">Power</button>
<button onclick="calculate('square')">Square</button>
<button onclick="calculate('sqrt')">Square Root</button>
<p id="result">Result: </p>
</div>
<script>
function calculate(operation) {
let num1 = Number(document.getElementById('num1').value);
let num2 = Number(document.getElementById('num2').value);
let res = 0;
switch(operation) {
case 'sum': res = num1 + num2; break;
case 'difference': res = num1 - num2; break;
case 'product': res = num1 * num2; break;
case 'quotient':
res = num2 !== 0 ? num1 / num2 : "Cannot divide by zero";
break;
case 'remainder':
res = num2 !== 0 ? num1 % num2 : "Cannot divide by zero";
break;
case 'power': res = Math.pow(num1, num2); break;
case 'square': res = num1 * num1; break;
case 'sqrt':
res = num1 >= 0 ? Math.sqrt(num1) : "Invalid for negative";
break;
}
document.getElementById('result').innerText = "Result: " + res;
}
</script>
</body>
</html>
